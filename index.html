<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
    }

    h1 { text-align: center; font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.4rem; }
    .subtitle { text-align: center; color: #6b7280; font-size: 0.9rem; margin-bottom: 2rem; }

    .tabs { display: flex; background: #f3f4f6; border-radius: 0.75rem; padding: 4px; margin-bottom: 1.75rem; }

    .tab {
      flex: 1; padding: 0.5rem; border: none; background: none;
      border-radius: 0.5rem; font-size: 0.9rem; font-weight: 600;
      color: #6b7280; cursor: pointer; transition: all 0.2s;
    }
    .tab.active { background: white; color: #6366f1; box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

    .form-group { margin-bottom: 1rem; }

    label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }

    input {
      width: 100%; padding: 0.75rem 1rem;
      border: 1.5px solid #e5e7eb; border-radius: 0.75rem;
      font-size: 0.95rem; color: #1a1a2e; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }

    .btn {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; border: none; border-radius: 0.75rem;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      margin-top: 0.5rem; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }

    .alert { padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
    .alert.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .alert.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    #app-screen { display: none; width: 100%; max-width: 900px; }

    .navbar {
      background: white; border-radius: 1rem; padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 1.5rem;
      flex-wrap: wrap; gap: 0.75rem;
    }

    .brand { font-weight: 700; font-size: 1.1rem; color: #1a1a2e; }
    .user-badge { display: flex; align-items: center; gap: 0.75rem; }

    .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: white; font-weight: 700; font-size: 0.9rem;
    }

    .user-email { font-size: 0.85rem; color: #374151; font-weight: 500; }

    .btn-logout {
      background: none; border: 1px solid #e5e7eb; border-radius: 0.5rem;
      padding: 0.4rem 0.9rem; font-size: 0.85rem; color: #6b7280; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }

    .welcome-banner {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 1.25rem; padding: 2rem; color: white; margin-bottom: 1.5rem;
    }
    .welcome-banner h2 { font-size: 1.4rem; margin-bottom: 0.4rem; }
    .welcome-banner p { opacity: 0.85; font-size: 0.9rem; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }

    .info-card { background: white; border-radius: 1rem; padding: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .info-card .icon { font-size: 1.6rem; margin-bottom: 0.5rem; }
    .info-card h3 { font-size: 0.95rem; font-weight: 600; color: #1a1a2e; }
    .info-card p { font-size: 0.82rem; color: #6b7280; margin-top: 0.2rem; }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.25rem; }
      .navbar { padding: 0.75rem 1rem; }
      .user-email { display: none; }
    }
  </style>
</head>
<body>

  <div class="card" id="auth-screen">
    <div class="logo">🚀</div>
    <h1>Mi App</h1>
    <p class="subtitle">Accede a tu cuenta para continuar</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', event)">Iniciar sesión</button>
      <button class="tab" onclick="switchTab('register', event)">Crear cuenta</button>
    </div>

    <div id="alert" class="alert"></div>

    <div id="form-login">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="login-email" placeholder="tu@correo.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="login()">Iniciar sesión</button>
    </div>

    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="reg-email" placeholder="tu@correo.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="reg-confirm" placeholder="Repite tu contraseña" />
      </div>
      <button class="btn" onclick="register()">Crear cuenta</button>
    </div>
  </div>

  <div id="app-screen">
    <nav class="navbar">
      <span class="brand">Malla Mecatronica</span>
      <div class="user-badge">
        <div class="avatar" id="user-initial">U</div>
        <span class="user-email" id="user-email-display"></span>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </nav>

    <div class="welcome-banner">
      <h2>¡Bienvenido! 👋</h2>
      <p id="welcome-email">Sesión iniciada correctamente.</p>
    </div>

    <div class="cards-grid">
      <div class="info-card"><div class="icon">📊</div><h3>Dashboard</h3><p>Consulta tu actividad reciente.</p></div>
      <div class="info-card"><div class="icon">⚙️</div><h3>Configuración</h3><p>Personaliza tu perfil.</p></div>
      <div class="info-card"><div class="icon">📁</div><h3>Archivos</h3><p>Gestiona tus documentos.</p></div>
      <div class="info-card"><div class="icon">💬</div><h3>Mensajes</h3><p>Revisa tus notificaciones.</p></div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════
    //  REEMPLAZA ESTOS DOS VALORES CON LOS TUYOS
    //  (Supabase → Settings → API)
    // ══════════════════════════════════════════════
    const SUPABASE_URL = 'https://otjhnrdovgqeqpofdwry.supabase.co/rest/v1/';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90amhucmRvdmdxZXFwb2Zkd3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNTM2NTgsImV4cCI6MjA5NzgyOTY1OH0.Yo0ymZfe_bStzczZpydeMXv680_QLW69ZPd9u92I1ys';
    // ══════════════════════════════════════════════

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    function switchTab(tab, e) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      hideAlert();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert ${type}`;
      el.style.display = 'block';
    }
    function hideAlert() { document.getElementById('alert').style.display = 'none'; }

    async function login() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showAlert('Completa todos los campos.');
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) return showAlert('Correo o contraseña incorrectos.');
      showApp(data.user);
    }

    async function register() {
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;
      if (!email || !password) return showAlert('Completa todos los campos.');
      if (password.length < 6)  return showAlert('La contraseña debe tener al menos 6 caracteres.');
      if (password !== confirm)  return showAlert('Las contraseñas no coinciden.');
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) return showAlert(error.message);
      if (data.user && !data.session) {
        showAlert('¡Cuenta creada! Revisa tu correo para confirmar.', 'success');
      } else {
        showApp(data.user);
      }
    }

    async function logout() {
      await sb.auth.signOut();
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display  = 'none';
    }

    function showApp(user) {
      document.getElementById('auth-screen').style.display  = 'none';
      document.getElementById('app-screen').style.display   = 'block';
      document.getElementById('user-email-display').textContent = user.email;
      document.getElementById('welcome-email').textContent  = `Sesión iniciada como ${user.email}`;
      document.getElementById('user-initial').textContent   = user.email[0].toUpperCase();
    }

    sb.auth.getSession().then(({ data }) => {
      if (data.session) showApp(data.session.user);
    });
  </script>

</body>
</html>
